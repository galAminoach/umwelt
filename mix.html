<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>UMWELT — vision</title>
<style>
  @font-face{ font-family:'PP Fraktion Mono'; src:url('fonts/PPFraktionMono-Regular.otf') format('opentype'); font-weight:400; font-display:swap; }
  @font-face{ font-family:'PP Fraktion Mono'; src:url('fonts/PPFraktionMono-Bold.otf') format('opentype'); font-weight:700; font-display:swap; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden}
  body{ display:flex;align-items:center;justify-content:center; background:#000; }
  /* the screen is the Umwelt of a cold vision system: black cage, warm wet meat pinned inside it */
  .stage{ position:relative; width:min(94vmin,900px); height:min(94vmin,900px); overflow:hidden; background:#000;
    box-shadow:0 0 0 1px rgba(0,255,204,0.10), 0 0 60px 8px rgba(0,40,36,0.30), inset 0 0 160px 14px rgba(0,0,0,0.92); }
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #bg{z-index:1} #gl{z-index:2} #fx{z-index:3}
  .glass{ position:absolute;inset:0;z-index:4;pointer-events:none;
    background:radial-gradient(140% 140% at 50% 48%, rgba(0,0,0,0) 62%, rgba(0,0,0,0.55) 100%); mix-blend-mode:multiply; }
  #umhud{position:absolute;top:6px;left:8px;z-index:6;font:11px 'PP Fraktion Mono',monospace;color:#00ffcc;text-shadow:0 0 4px #000;white-space:pre;pointer-events:none}
  video{position:absolute;width:2px;height:2px;opacity:0;pointer-events:none;left:-10px;top:-10px}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <canvas id="bg"></canvas>
    <canvas id="gl"></canvas>
    <canvas id="fx"></canvas>
    <div class="glass"></div>
    <div id="umhud"></div>
    <video id="vid" playsinline muted></video>
    <audio id="snd" src="audio/flow.wav" loop preload="auto"></audio>
  </div>

<script type="module">
import { FaceLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const cv=document.getElementById('gl');
const gl=cv.getContext('webgl2',{alpha:false});
const fxc=document.getElementById('fx'); const xc=fxc.getContext('2d');
const bgcv=document.getElementById('bg'); const bgc=bgcv.getContext('2d');
const vid=document.getElementById('vid');
if(!gl) throw new Error('no webgl2');

/* ---------- sound bed for the flow (looped) ---------- */
const snd=document.getElementById('snd'); snd.volume=0.9;
let audioOn=false;
function startAudio(){ if(audioOn) return; const p=snd.play(); if(p&&p.then) p.then(()=>{audioOn=true;}).catch(()=>{}); else audioOn=true; }
startAudio();                                                   // try autoplay (kiosk: launch Chrome with --autoplay-policy=no-user-gesture-required)
for(const ev of ['pointerdown','keydown','touchstart']) window.addEventListener(ev, startAudio);  // else unlock on first gesture
/* region selection: TAP a region name (touch/iPad) confirms it; the live mouth-open also confirms the highlighted region; keys 1·2·3 remain an operator aid */
window.addEventListener('keydown', e=>{
  if(state===S.REPORT && st>2.0 && (e.key==='Enter'||e.key===' ')){ enter(S.RETURN); e.preventDefault(); return; }
  if(state!==S.SELECT) return; const m={'1':0,'2':1,'3':2};
  if(e.key in m){ selHighlight=m[e.key]; } else if(e.key==='Enter'||e.key===' '){ selectPart(PART_ORDER[selHighlight]); e.preventDefault(); } });
fxc.addEventListener('pointerdown', e=>{
  if(state===S.REPORT && st>2.0){ enter(S.RETURN); e.preventDefault(); return; }   // the certificate can be dismissed — tap to continue
  if(state!==S.SELECT || forcePart) return; const r=fxc.getBoundingClientRect(); if(!r.width) return;
  const sz=sizePx, x=(e.clientX-r.left)/r.width*sz, y=(e.clientY-r.top)/r.height*sz, oW=sz*0.20, ox=sz/2-(PART_ORDER.length*oW)/2, oy=sz*0.058;
  if(y>oy-sz*0.055 && y<oy+sz*0.045){ for(let i=0;i<PART_ORDER.length;i++){ const cx0=ox+i*oW; if(x>=cx0 && x<=cx0+oW){ selHighlight=i; selectPart(PART_ORDER[i]); e.preventDefault(); return; } } } });
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x)), lerp=(a,b,t)=>a+(b-a)*t;
const smoothstep=(a,b,x)=>{const t=clamp((x-a)/(b-a),0,1);return t*t*(3-2*t);};
const DEBUG=location.search.includes('debug');
/* COLD palette — the machine's territory. The meat (GL) stays warm; everything 2D is cold cyan/white. */
const CYAN='#00ffcc', CY='rgba(0,255,204,', WHITE='#ffffff';
const VOICE_INK=CYAN;   // the machine's spoken voice (bottom line) — CAPS + cyan, as in the opening; single source, easy to retune
const MAG=CYAN, MG=CY;                                         // measurements are CYAN (the pink accent was dropped); MAG/MG kept as one-line swap points

/* ===== the mouth — warm wet living meat (live) → fixed specimen (capture).
   The cold gaze chills it where it scans (uScanY) and leaves a permanent residual (uChill). ===== */
const VERT=`#version 300 es
in vec2 c; out vec2 uv; void main(){ uv=c*0.5+0.5; gl_Position=vec4(c,0.,1.); }`;
const FRAG=`#version 300 es
precision highp float; in vec2 uv; out vec4 O;
uniform sampler2D uMouth; uniform float uTime,uHasCrop,uAspect,uCapture,uInflate,uScanY,uChill,uStretch,uFace,uWet,uCenterX,uScale;
float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
// the operating-table / inside-the-DB graticule: dim, DEAD, behind the meat.
// anisotropic — dense ruled record-rows (horizontal) + sparse barrel-curved meridians (vertical).
vec3 graticule(vec2 p){
  vec2 q=p-0.5; float bar=0.06;                                  // barely-there barrel on the meridians only
  float mx=q.x*(1.0+bar*(q.y*q.y*4.0-q.x*q.x));
  float rows=fract(p.y/0.026);                                   // ledger rows ~ every 0.026
  float rl=smoothstep(0.5,0.0,abs(rows-0.5)*2.0-0.93);
  float fifth=(mod(floor(p.y/0.026),5.0)<0.5)?1.0:0.0;           // every 5th row brighter
  float mer=fract((mx+0.5)/0.085);                               // sparse meridians ~ every 0.085
  float ml=smoothstep(0.5,0.0,abs(mer-0.5)*2.0-0.96);
  float g=rl*(0.06+0.07*fifth)+ml*0.05;
  return vec3(0.0,0.85,0.72)*g;                                  // dim teal-cyan
}
float vnoise(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.-2.*f);
  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y); }
float fbm(vec2 p){ float s=0.,a=.5; for(int i=0;i<4;i++){ s+=a*vnoise(p); p*=2.04; a*=.5;} return s; }
vec3 wet3(vec3 col){ col=pow(max(col,0.),vec3(1.06)); vec3 wine=vec3(0.5,0.07,0.17); return mix(col, col*wine*2.6, 0.15); }
void main(){
  vec2 p=uv;
  float scl=(uScale<=0.0)?1.0:uScale;
  vec2 box=vec2(0.40*scl*(1.0+uStretch*0.55), 0.40/max(uAspect,1.0)*scl*(1.0-uStretch*0.10));  // STRESS: caliper pulls width · uScale: GRADING shrink
  vec2 d=(p-vec2((uCenterX<=0.0)?0.5:uCenterX,0.5))/box;
  float t=uTime; float cap=clamp(uCapture,0.0,1.0);
  // faint life only — no psychedelic loop; the meat breathes, the cold gaze does the moving
  vec2 flow=vec2(fbm(d*3.2+t*0.25), fbm(d*3.2 - t*0.20+7.0))-0.5;
  float wet=clamp(uWet,0.0,1.0);                                 // 0 = sharp lip cutout · 1 = deliberately-wet membrane (ramped, never a hard cut)
  float live=0.020*wet;                                          // wobble only as it wets
  vec2 dd=d + flow*live;
  vec2 cuv=clamp(dd*0.5+0.5,0.0,1.0);
  cuv = clamp(0.5 + (cuv-0.5)/(1.0+uInflate*vec2(0.30,0.74)), 0.0, 1.0);   // NORMALIZE: meat pulled toward mean volume
  vec3 ground=vec3(0.0);                                         // plain black ground (grid removed)
  vec3 flesh;
  if(uHasCrop>0.5){
    vec3 c0=texture(uMouth,cuv).rgb;
    vec2 e=1.8/vec2(textureSize(uMouth,0)), e2=4.2/vec2(textureSize(uMouth,0));  // multi-scale unsharp ALWAYS — fights low-res webcam softness
    vec3 bl=(texture(uMouth,cuv+vec2(e.x,0.0)).rgb+texture(uMouth,cuv-vec2(e.x,0.0)).rgb
            +texture(uMouth,cuv+vec2(0.0,e.y)).rgb+texture(uMouth,cuv-vec2(0.0,e.y)).rgb)*0.25;
    vec3 bl2=(texture(uMouth,cuv+vec2(e2.x,0.0)).rgb+texture(uMouth,cuv-vec2(e2.x,0.0)).rgb
             +texture(uMouth,cuv+vec2(0.0,e2.y)).rgb+texture(uMouth,cuv-vec2(0.0,e2.y)).rgb)*0.25;
    float shp=mix(2.6,0.2,wet)+cap*1.2;                         // sharp when not wet; extra crunch on capture; softens only as wet ramps
    c0=c0+(c0-bl)*shp + (c0-bl2)*shp*0.45;                      // fine + coarse detail
    c0=mix(c0,(c0-0.5)*(1.0+0.42*(1.0-wet))+0.5, 0.7);
    flesh=clamp(c0,0.0,1.0);
  } else flesh=vec3(0.30,0.06,0.12);
  flesh=mix(flesh, wet3(flesh), 0.42);                          // warm wine grade (colour, NOT blur) — always on
  float sheen=pow(max(0.0,1.0-length(d*vec2(0.8,1.2))),3.0);
  flesh+=sheen*vec3(1.0,0.9,0.94)*(0.16+0.12*wet);             // wet sheen grows with wetness
  // --- the gaze chills the meat: desaturate toward grey-cyan under the scan + a permanent residual ---
  float chill=clamp(uChill,0.0,1.0);
  if(uScanY>=0.0){ float passed=smoothstep(uScanY+0.02, uScanY-0.22, p.y); chill=max(chill, passed*0.55); }
  float g=dot(flesh,vec3(0.299,0.587,0.114));
  vec3 cold=mix(vec3(g), vec3(0.55,0.86,0.86)*g*1.25, 0.55);
  flesh=mix(flesh, cold, chill);
  // membrane mask
  vec2 dM=d/(1.0+uInflate*vec2(0.28,0.60));
  float r=length(dM*vec2(0.80,1.0));
  r += (fbm(uv*3.4+t*0.18)-0.5)*0.12*wet;                       // edge only ripples once wet
  float lo=mix(0.86,0.46,wet), hi=1.01;                         // tight crisp silhouette when sharp → soft membrane as it wets
  float mask=smoothstep(hi,lo,r)*(1.0-clamp(uFace,0.0,1.0));     // uFace=1 → grid only (the meat is replaced/absent)
  vec3 col=mix(ground, flesh, mask);
  float vig=smoothstep(1.6,0.35,length((p-0.5)*2.0)); col*=0.62+0.38*vig;
  col+=(hash(p*vec2(900.0)+t)-0.5)*0.008;
  O=vec4(max(col,0.0),1.0);
}`;
function sh(ty,src){ const s=gl.createShader(ty); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s)); return s; }
const prog=gl.createProgram(); gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT)); gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));
gl.linkProgram(prog); if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const quad=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,quad);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const cl=gl.getAttribLocation(prog,'c'); gl.enableVertexAttribArray(cl); gl.vertexAttribPointer(cl,2,gl.FLOAT,false,0,0);
const U=(n)=>gl.getUniformLocation(prog,n);
const u={ mouth:U('uMouth'),time:U('uTime'),hasCrop:U('uHasCrop'),aspect:U('uAspect'),capture:U('uCapture'),inflate:U('uInflate'),scanY:U('uScanY'),chill:U('uChill'),stretch:U('uStretch'),face:U('uFace'),wet:U('uWet'),centerX:U('uCenterX'),scale:U('uScale') };
gl.uniform1i(u.mouth,0);
const mouthTex=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,mouthTex);
for(const pn of [gl.TEXTURE_WRAP_S,gl.TEXTURE_WRAP_T]) gl.texParameteri(gl.TEXTURE_2D,pn,gl.CLAMP_TO_EDGE);
for(const pn of [gl.TEXTURE_MIN_FILTER,gl.TEXTURE_MAG_FILTER]) gl.texParameteri(gl.TEXTURE_2D,pn,gl.LINEAR);

let DPR=Math.min(window.devicePixelRatio||1,1.5), sizePx=900;
function resize(){ const r=cv.getBoundingClientRect(); sizePx=r.width||900;
  cv.width=fxc.width=bgcv.width=Math.round(sizePx*DPR); cv.height=fxc.height=bgcv.height=Math.round(sizePx*DPR);
  gl.viewport(0,0,cv.width,cv.height); xc.setTransform(DPR,0,0,DPR,0,0); bgc.setTransform(DPR,0,0,DPR,0,0); }
window.addEventListener('resize',resize); resize();

/* mouth display rect on the 2D overlay (matches the shader's box mapping) */
function mouthRect(){ const bx=0.40, by=0.40/Math.max(stillAspect,1.0);
  return { x:(0.5-bx)*sizePx, y:(0.5-by)*sizePx, w:2*bx*sizePx, h:2*by*sizePx }; }
function INSET(){ return sizePx*0.052; }                                   // the cold cage: ~47px @900
// SAFE CONTENT BAND — any mouth-rect-relative label must clamp into it, or a tall mouth crop (R spans 0.10–0.90·S)
// pushes top labels into the header/queue and bottom labels through the bottom status line.
function yTop(y){ return Math.max(y, sizePx*0.155); }                      // stays below the header + queue strip
function yBot(y){ return Math.min(y, sizePx*0.900); }                      // stays above the bottom status/voice line
/* ONE type scale (5 steps, proportional to the square) + ONE banner grid — every screen shares these so the layout reads as a single instrument.
   micro=annotation · label=chrome/labels · body=voice · title=screen name · hero=the one dominant word/number */
function TZ(){ const S=sizePx; return { micro:Math.max(7,Math.round(S*0.0089)), label:Math.round(S*0.0122), body:Math.round(S*0.0167), title:Math.round(S*0.0244), hero:Math.round(S*0.058) }; }
const GY={ banner:0.125, subline:0.158, subject:0.205, footVoice:0.955 };  // shared vertical anchors (fractions of the square)
function screenBanner(title, sub){ const S=sizePx, t=TZ();                  // identical header block on every screen — WHITE headline, cyan sub
  ctext(senCase(title), S/2, S*GY.banner, {size:t.title,col:WHITE,align:'center',track:1});
  if(sub) ctext(senCase(sub), S/2, S*GY.subline, {size:t.label,col:CY+'0.55)',align:'center',track:1}); }

/* ---------- crop the live video to the lips ---------- */
const cropCv=document.createElement('canvas'); const cctx=cropCv.getContext('2d');
let hasCrop=0, cropAspect=1.7, stillAspect=1.7;
function updateCrop(){
  if(frozen) return;
  if(!camOK||vid.readyState<2||!vid.videoWidth) return;
  const vw=vid.videoWidth,vh=vid.videoHeight; const sw=2*vidCrop.hx*vw, sh=2*vidCrop.hy*vh; if(sw<4||sh<4) return;
  cropAspect=clamp(sw/sh,1.0,3.0); cropCv.width=1024; cropCv.height=Math.max(2,Math.round(1024/cropAspect));   // higher-res crop → sharp cutout, not a smear
  cctx.save(); cctx.translate(cropCv.width,0); cctx.scale(-1,1);
  try{ cctx.drawImage(vid,(vidCrop.cx-vidCrop.hx)*vw,(vidCrop.cy-vidCrop.hy)*vh,sw,sh,0,0,cropCv.width,cropCv.height); }catch(e){ cctx.restore(); return; }
  cctx.restore();
  gl.bindTexture(gl.TEXTURE_2D,mouthTex); gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,cropCv); gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,false); hasCrop=1;
  sampleMouthTint();                                                          // keep the captured-mouth colour current (frozen once frozen)
}
/* the CURRENT participant's mouth colour — every specimen is repainted to this so the comparison is SHAPE, not colour */
let mouthTint='rgb(196,120,120)';
const tintCv=document.createElement('canvas'); tintCv.width=tintCv.height=6; const tintCtx=tintCv.getContext('2d',{willReadFrequently:true});
function sampleMouthTint(){ if(!hasCrop) return;
  try{ tintCtx.drawImage(cropCv, cropCv.width*0.28, cropCv.height*0.34, cropCv.width*0.44, cropCv.height*0.42, 0,0,6,6);
    const d=tintCtx.getImageData(0,0,6,6).data; let r=0,g=0,b=0,n=0; for(let i=0;i<d.length;i+=4){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
    mouthTint='rgb('+Math.round(r/n)+','+Math.round(g/n)+','+Math.round(b/n)+')'; }catch(e){} }
/* live lip ring (crop-normalised, top-down) — used for the isolation contour + measurement */
function ringFromLM(L){ return ringOf(L, curPart); }                          // the live ring of whatever part is selected
let capLip=null, liveRing=null;
function snapshotCapture(){
  stillAspect=cropAspect; capLip=ringFromLM(lastLM);
  if(capLip){ if(curPart===PART.LIPS) updateMean(capLip);                    // lips grow the designed mean
    else curPart.idealNorm=symmetrize(centerScale(capLip));                  // nose/eyes: the symmetric form becomes the ideal
    devPct=deviationOf(capLip); }
  count++; localStorage.setItem(COUNT_KEY,String(count));
}

/* ---------- the honest AVERAGE (computed, not invented) ----------
   Shape-only (translation+scale invariant) mean of every lip ring the system has seen.
   Seeded with a canonical reference corpus so "the mean" exists from frame one; each visitor updates it. */
function centerScale(ring){ let cx=0,cy=0; for(const[x,y]of ring){cx+=x;cy+=y;} cx/=ring.length;cy/=ring.length;
  let s=0; const c=ring.map(([x,y])=>{const dx=x-cx,dy=y-cy; s+=dx*dx+dy*dy; return [dx,dy];}); s=Math.sqrt(s/ring.length)||1;
  return c.map(([dx,dy])=>[dx/s,dy/s]); }                                    // centroid 0, RMS radius 1
/* realistic outer-lip ring in LIPS winding (normalised lip-bbox coords) — a true average lip shape.
   x is mirrored (1-x) to match the selfie-mirrored display rings (ringFromLM uses uX=1-...). */
const CANON=centerScale([
  [0.00,0.50],[0.12,0.32],[0.22,0.22],[0.31,0.17],[0.42,0.14],[0.50,0.16],[0.58,0.14],[0.69,0.17],[0.78,0.22],[0.88,0.32],[1.00,0.50],
  [0.88,0.66],[0.78,0.76],[0.69,0.82],[0.58,0.85],[0.50,0.86],[0.42,0.85],[0.31,0.82],[0.22,0.76],[0.12,0.66] ].map(([x,y])=>[1-x,y]));
const MEAN_KEY='umwelt.vision.mean', SEED_N=35;
let meanShape, meanN;
(function loadMean(){ try{ const s=JSON.parse(localStorage.getItem(MEAN_KEY)||'null');
  if(s&&s.shape&&s.shape.length===20){ meanShape=s.shape; meanN=s.n||SEED_N; return; } }catch(e){}
  meanShape=CANON.map(p=>p.slice()); meanN=SEED_N; })();
function deviationOf(ring, part){ part=part||curPart; const ref=idealNormFor(part); if(!ref||!ring) return 0;
  const s=centerScale(ring), n=Math.min(s.length,ref.length); let e=0;
  for(let i=0;i<n;i++){ const dx=s[i][0]-ref[i][0], dy=s[i][1]-ref[i][1]; e+=dx*dx+dy*dy; }
  return clamp(Math.sqrt(e/n)*78, 0, 99.9); }                              // real RMS shape-distance from the part's ideal → %
function updateMean(ring){ const s=centerScale(ring); const n=meanN;
  for(let i=0;i<20;i++){ meanShape[i][0]=(meanShape[i][0]*n+s[i][0])/(n+1); meanShape[i][1]=(meanShape[i][1]*n+s[i][1])/(n+1); }
  meanN=n+1; try{ localStorage.setItem(MEAN_KEY,JSON.stringify({shape:meanShape,n:meanN})); }catch(e){} }
/* the mean SHAPE re-fitted to a captured ring's own centroid+scale → the "AVERAGE" template overlaid in place */
function meanTemplateFor(ring, part){ part=part||curPart; const ref=idealNormFor(part); if(!ring||!ref) return null;
  let cx=0,cy=0; for(const[x,y]of ring){cx+=x;cy+=y;} cx/=ring.length;cy/=ring.length;
  let s=0; for(const[x,y]of ring){s+=(x-cx)*(x-cx)+(y-cy)*(y-cy);} s=Math.sqrt(s/ring.length)||1;
  return ref.map(([dx,dy])=>[cx+dx*s, cy+dy*s]); }

/* ---------- REVISION 4 · AESTHETIC STATISTICS shared state (one source of truth) ---------- */
function percentileFromDev(d){ return clamp(Math.round(99*Math.exp(-d/30)),1,99); }   // devShown≈31 → ~35th; low deviation → high percentile
let pctShown=34;                                                                       // eased toward percentileFromDev(devShown) each frame
const easeCubic=t=>1-Math.pow(1-t,3);
let regionalSamples=(+localStorage.getItem('umwelt.regionalSamples'))||21406;          // ONE population figure: SAMPLE Nº === "N regional samples"
function commitSample(){ regionalSamples++; try{ localStorage.setItem('umwelt.regionalSamples',regionalSamples);}catch(e){} }
function ord(n){ n=Math.round(n); const s=['TH','ST','ND','RD'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }   // 1ST 2ND 3RD 34TH
function fmt(n){ return Math.round(n).toLocaleString('en-US'); }                       // 21,409
/* multi-organ queue (Umwelt-local); the next organ opens only after the previous visibly closes out */
const queue=[ {n:'01',label:'LIPS',status:'ANALYZING'}, {n:'02',label:'NOSE',status:'QUEUED'},
  {n:'03',label:'BROWS',status:'QUEUED'}, {n:'04',label:'EYES',status:'QUEUED'}, {n:'05',label:'JAWLINE',status:'MODULE PENDING'} ];
function resetQueue(){ queue[0].status='ANALYZING'; queue[1].status='QUEUED'; }
let sessionSampleNo=regionalSamples, report=null;                                       // frozen at capture / report
/* Rev5 · the verdict is a persistent judgment, not a passing readout */
let lastPct=(()=>{ const v=localStorage.getItem('umwelt.lastPct'); return v==null?null:+v; })();   // the PREVIOUS visitor's rank
let verdict=null;                                                                        // {cls,pct} — stamped at sentencing, held through every later state
function classifyDev(d){ return d<10?'NEAR-IDEAL':d<25?'ACCEPTABLE':d<45?'SUBSTANDARD':'CORRECTION URGENT'; }

/* ---------- catalog material (real cutouts) for COMPARE flicker ---------- */

function tickState(dt, now){

function ringCentroid(P){ let cx=0,cy=0; for(const p of P){cx+=p[0];cy+=p[1];} return [cx/P.length,cy/P.length]; }
function edgeLabel(p,c){ const dx=p[0]-c[0], dy=p[1]-c[1]; return Math.abs(dy)>=Math.abs(dx) ? (dy<0?'UPPER EDGE':'LOWER EDGE') : (dx<0?'LEFT EDGE':'RIGHT EDGE'); }
function topOffsets(lr,ir,n){ const a=[]; for(let i=0;i<lr.length;i++){ const dx=ir[i][0]-lr[i][0], dy=ir[i][1]-lr[i][1]; a.push({i,dx,dy,mag:Math.hypot(dx,dy)}); } a.sort((p,q)=>q.mag-p.mag); return a.slice(0,n); }
function arrow(p,q,style,w){ xc.save(); xc.strokeStyle=style; xc.fillStyle=style; xc.lineWidth=w;
  xc.beginPath(); xc.moveTo(p[0],p[1]); xc.lineTo(q[0],q[1]); xc.stroke(); const ang=Math.atan2(q[1]-p[1],q[0]-p[0]), a=6.5;
  xc.beginPath(); xc.moveTo(q[0],q[1]); xc.lineTo(q[0]-a*Math.cos(ang-0.42),q[1]-a*Math.sin(ang-0.42)); xc.lineTo(q[0]-a*Math.cos(ang+0.42),q[1]-a*Math.sin(ang+0.42)); xc.closePath(); xc.fill(); xc.restore(); }

  const R=mouthRect(), offs=topOffsets(lr,ir,3), tol=R.h*0.045, top=offs[0];
  if(corrTrackIdx>=0){ const cur=offs.find(o=>o.i===corrTrackIdx); const m=cur?cur.mag:Math.hypot(ir[corrTrackIdx][0]-lr[corrTrackIdx][0],ir[corrTrackIdx][1]-lr[corrTrackIdx][1]);
    if(m<tol){ corrTagIdx=corrTrackIdx; corrTagT=T; corrTrackIdx=-1; } }
  if(corrTrackIdx<0 && top.mag>tol) corrTrackIdx=top.i;
  for(let j=0;j<offs.length;j++){ const o=offs[j]; if(o.mag<2) continue; const p=lr[o.i], q=ir[o.i], strong=(j===0);

  [S.ABSORB]:[()=>'CORRECTION COMPLETE. YOU MATCH THE IDEAL.'],
  [S.ARCHIVE]:[()=>'FILED WITH ALL THE OTHERS.', ()=>'ONE SHAPE. '+fmt(regionalSamples)+' RECORDS.'],
  [S.ABSENCE]:[()=>'YOUR RECORD REMAINS OPEN.'],
};
let comCur='', comStart=-9, comPrev='', comPrevStart=-9, comKey='';
function wrapVoice(s, maxw, px){ xc.save(); xc.font=px+"px 'PP Fraktion Mono',monospace"; xc.letterSpacing='1px';
  const words=(''+s).split(' '), out=[]; let cur='';
  for(const w of words){ const t=cur?cur+' '+w:w; if(cur && xc.measureText(t).width>maxw){ out.push(cur); cur=w; } else cur=t; }
  if(cur) out.push(cur);
  // no orphan: if the last line is a lone word, pull the previous word down so the last line has ≥2 words (when it still fits)
  if(out.length>1 && out[out.length-1].indexOf(' ')<0){ const pw=out[out.length-2].split(' ');
    if(pw.length>1){ const cand=pw[pw.length-1]+' '+out[out.length-1];
      if(xc.measureText(cand).width<=maxw){ out[out.length-1]=cand; pw.pop(); out[out.length-2]=pw.join(' '); } } }
  xc.restore(); return out.length?out:['']; }
function drawCommentary(){ const lines=COMMENTARY[state]||[];                    // the machine's VOICE — one large fixed size everywhere; long sentences WRAP instead of shrinking
  if(lines.length){ const idx=Math.min(lines.length-1, Math.floor(st/4.2));      // each voice line holds ~4.2s (readable)
    const dirTag=(MEASURE_STATES.has(state)&&curDir)?(curDir.part+curDir.dir):'';
    const key=state+':'+idx+':'+dirTag;
    if(key!==comKey){ comPrev=comCur; comPrevStart=T; comCur=lines[idx]().toUpperCase(); comStart=T; comKey=key; } }   // voice back in CAPS (like the opening)
  if(!comCur) return;
  const VSZ=Math.round(sizePx*0.023), maxw=sizePx-2*INSET(), lh=Math.round(VSZ*1.25), baseY=sizePx-INSET()*0.9;
  const full=wrapVoice(comCur, maxw, VSZ);                                        // stable line breaks for the whole sentence
  const shownN=Math.floor((T-comStart)/0.03), typing=shownN<comCur.length;        // typewriter reveals across the wrapped lines, breaks never shift
  let remain=shownN; const draw=[];
  for(const ln of full){ if(remain<=0 && draw.length) break;
    if(remain>=ln.length){ draw.push(ln); remain-=ln.length+1; }
    else { draw.push(ln.slice(0,Math.max(0,remain))); remain=-1; break; } }
  if(!draw.length) draw.push('');
  if(typing) draw[draw.length-1]+=((T*2|0)%2)?'_':'';
  for(let i=0;i<draw.length;i++) ctext(draw[i], INSET(), baseY-(draw.length-1-i)*lh, {size:VSZ,col:VOICE_INK,track:0.5}); }   // the machine's spoken voice (bottom line)

/* 5 · the final report — every number traces to a live measurement */
function drawCapMouth(x,y,w,h){ const cx=x+w/2, cy=y+h/2, ww=w*0.96, hh=h*0.94;          // YOU — clipped to the CHOSEN region's contour, same as the samples/ideal
  const framePath=()=>regionClipPath(cx,cy,ww,hh);
  if(hasCrop){ xc.save(); framePath(); xc.clip();
    const a=cropAspect, z=curPart.key==='LIPS'?1.30:1.10; let dw=w*z,dh=w*z/a; if(dh<h*z){dh=h*z;dw=h*z*a;}
    xc.filter='blur(0.4px) contrast(1.06) brightness(1.02) saturate(1.05)';
    xc.drawImage(cropCv, x+(w-dw)/2, y+(h-dh)/2, dw, dh); xc.filter='none'; xc.restore(); }
  else { xc.save(); framePath(); xc.fillStyle='rgba(0,20,18,0.5)'; xc.fill(); xc.restore(); }
  framePath(); xc.strokeStyle=CYAN; xc.lineWidth=1.7; xc.stroke(); }                     // YOU gets the bright cyan contour
const REGION_NAME={ 'UPPER EDGE':'UPPER LIP', 'LOWER EDGE':'LOWER LIP', 'LEFT EDGE':'LEFT CORNER', 'RIGHT EDGE':'RIGHT CORNER' };
function buildReport(){
  const my=lipMetrics(ringPx(capLip)), id=lipMetrics(ringPx(meanTemplateFor(capLip)));
  // every row is REAL: your measured value vs the value the ideal template has, same units, deviation + a plain reading
  const rows=(my&&id)?curPart.rows.map(([label,key,unit])=>{ const you=my[key], ideal=id[key];
    const dev=ideal?Math.abs(you-ideal)/Math.abs(ideal)*100:0, rel=ideal?(you-ideal)/Math.abs(ideal)*100:0;
    return {label,you,ideal,unit,dev, read: dev<3?'WITHIN RANGE':(rel>0?'ABOVE IDEAL':'BELOW IDEAL')}; }):[];
  const lr=ringPx(capLip), ir=ringPx(meanTemplateFor(capLip)), R=mouthRect(), lc=lr?ringCentroid(lr):[0,0];
  // conclusions: the LARGEST real gap per region (deduped), worst-first — each names the region, the real %, and the real direction toward the ideal
  const byReg={};
  if(lr&&ir) for(let i=0;i<lr.length;i++){ const dx=ir[i][0]-lr[i][0], dy=ir[i][1]-lr[i][1], mag=Math.hypot(dx,dy);
    if(mag<=R.h*0.03) continue; const reg=edgeLabel(lr[i],lc); if(!byReg[reg]||mag>byReg[reg].mag) byReg[reg]={dx,dy,mag}; }
  const scripts=Object.entries(byReg).sort((a,b)=>b[1].mag-a[1].mag).slice(0,3).map(([reg,o])=>{
    const vert=Math.abs(o.dy)>=Math.abs(o.dx), pv=Math.abs(100*(vert?o.dy/R.h:o.dx/R.w));
    const dir = vert ? (o.dy<0?'RAISE':'LOWER') : (reg==='RIGHT EDGE' ? (o.dx>0?'WIDEN':'NARROW') : (o.dx<0?'WIDEN':'NARROW'));
    const name = curPart===PART.LIPS ? (REGION_NAME[reg]||reg) : reg;
    return dir+' YOUR '+name+' BY '+(pv<1?pv.toFixed(1):Math.round(pv))+'% TO REACH THE IDEAL.'; });
  return { t:new Date(), no:sessionSampleNo, part:curPart.key, pct:Math.round(pctShown), pop:regionalSamples, rows, scripts,
    cls:(verdict?verdict.cls:classifyDev(devShown)), dev:+devShown.toFixed(1), prev:lastPct }; }
function drawReport(k){ if(!report) report=buildReport();
  const S=sizePx, ins=INSET(), x=ins+S*0.011, W=S-2*(ins+S*0.011);              // ALL layout proportional to the square → fits any size, no footer collision
  // ONE tight system: 3 sizes · 2 inks (+cyan for data) · sentence case · no per-line tracking. Consistency over variety.
  const HEAD=Math.round(S*0.023), BODY=Math.round(S*0.0165), META=Math.round(S*0.0138);   // META bumped so secondary text is readable, not fine print
  const INK='rgba(232,240,238,0.95)', DIM='rgba(232,240,238,0.82)';            // secondary ink brought up to clearly legible on black (grey/faint read as un-designed)
  const part=senCase(report.part), cls=senCase(report.cls);
  const rule=yy=>{ xc.save(); xc.strokeStyle='rgba(232,240,238,0.14)'; xc.lineWidth=1; xc.beginPath(); xc.moveTo(x,yy); xc.lineTo(x+W,yy); xc.stroke(); xc.restore(); };
  const iw=S*0.25, ih=iw*0.62, rowsN=report.rows.length, scrN=report.scripts.length||1, hasPrev=report.prev!=null;   // larger lip tiles
  // vertical budget: sum every gap this layout will consume, then compress whitespace (never fonts) so content always lands above the fixed footer — no overlap at any row/correction count
  const sumGaps=0.024+0.022+0.014+0.056+0.056+0.034+0.014+0.034+0.033*rowsN+0.016+0.058+0.040+0.040+(hasPrev?0.040:0)+0.062+0.044+0.048*scrN;
  const y0=ins+S*0.024, fy=S-ins-S*0.016, footRule=fy-S*0.022;
  const avail=(footRule-S*0.012)-y0, needed=S*sumGaps+ih;
  const vsF = needed>avail ? clamp((avail-ih)/(S*sumGaps),0.6,1) : 1, g=c=>S*c*vsF;
  let y=y0;
  ctext('Aesthetic Statistics · Individual Report', x, y, {size:BODY,col:INK});
  ctext(report.t.toLocaleString('en-GB'), x+W, y, {size:META,col:DIM,align:'right'}); y+=g(0.024);
  ctext('Sample №'+fmt(report.no), x, y, {size:META,col:DIM});
  { xc.save(); xc.font=META+"px 'PP Fraktion Mono',monospace";                  // 'Classification ·' stays dim, the verdict itself is CYAN
    const s1='Classification · ', w1=xc.measureText(s1).width, w2=xc.measureText(cls).width, cx0=x+W/2-(w1+w2)/2; xc.restore();
    ctext(s1, cx0, y, {size:META,col:DIM}); ctext(cls, cx0+w1, y, {size:META,col:CYAN}); }
  ctext('Region · '+part, x+W, y, {size:META,col:DIM,align:'right'}); y+=g(0.022);
  ctext('Each feature measured against the 2026 ideal — your distance from it is your deviation.', x, y, {size:META,col:DIM}); y+=g(0.014); rule(y); y+=g(0.056);
  ctext('You', x, y-S*0.011, {size:META,col:DIM}); drawCapMouth(x,y,iw,ih);
  y+=ih+g(0.056); rule(y); y+=g(0.034);
  const cY=x+W*0.44, cI=x+W*0.60, cD=x+W*0.74;                                   // column anchors: You · Ideal · Deviation · Reading(right)
  ctext('Parameter', x, y, {size:META,col:DIM}); ctext('You', cY, y, {size:META,col:DIM,align:'right'});
  ctext('Ideal', cI, y, {size:META,col:DIM,align:'right'}); ctext('Deviation', cD, y, {size:META,col:DIM,align:'right'}); ctext('Reading', x+W, y, {size:META,col:DIM,align:'right'}); y+=g(0.014); rule(y); y+=g(0.034);
  for(const r of report.rows){ ctext(senCase(r.label), x, y, {size:BODY,col:INK});
    ctext(r.you.toFixed(1)+r.unit, cY, y, {size:BODY,col:CYAN,align:'right'});                                    // YOUR value — the datum, cyan
    ctext(r.ideal.toFixed(1)+r.unit, cI, y, {size:BODY,col:DIM,align:'right'});
    ctext(r.dev.toFixed(1)+'%', cD, y, {size:BODY,col:CYAN,align:'right'});                                       // the deviation — the datum, cyan
    ctext(senCase(r.read), x+W, y, {size:META,col:(r.read==='WITHIN RANGE'?DIM:CYAN),align:'right'}); y+=g(0.033); }
  y+=g(0.016); rule(y); y+=g(0.058);
  ctext('You ranked in the '+ord(report.pct).toLowerCase()+' percentile', x, y, {size:HEAD,col:INK}); y+=g(0.040);
  // the whole conclusion block is ONE headline size (HEAD); brightness carries hierarchy, not size. Long lines fit-to-width so nothing clips.
  const HFIT=s=>Math.min(HEAD,fitText(s,W,HEAD));
  const closer='You are closer to the ideal than '+(100-report.pct)+'% of '+fmt(report.pop)+' regional samples.';
  ctext(closer, x, y, {size:HFIT(closer),col:INK}); y+=g(0.040);
  if(hasPrev){ const pv='The previous visitor ranked '+ord(report.prev).toLowerCase()+'. You rank '+ord(report.pct).toLowerCase()+'.';
    ctext(pv, x, y, {size:HFIT(pv),col:DIM}); y+=g(0.040); }
  const bands='Bands · <10% near-ideal · <25% acceptable · <45% substandard';
  ctext(bands, x, y, {size:HFIT(bands),col:DIM}); y+=g(0.062);
  const presc='Prescribed corrections — the moves that close your gaps';
  ctext(presc, x, y, {size:HFIT(presc),col:DIM}); y+=g(0.044);
  if(report.scripts.length) for(const s of report.scripts){ const ln='·  '+senCase(s); ctext(ln, x, y, {size:HFIT(ln),col:INK}); y+=g(0.048); }
  else { ctext('·  None outstanding. You already match the ideal.', x, y, {size:HEAD,col:INK}); }
  rule(footRule);
  const foot='Re-examination · 14 days · status: enrolled · awaiting correction';
  ctext(foot, x, fy, {size:META,col:DIM});
  { // continue affordance — a long drawn arrow, bottom-right (whole screen also advances); stroked, not a font glyph, so the shaft can be long
    const armed=st>2.0, pl=0.6+0.4*Math.sin(T*2.2), col=armed?CY+(0.55+0.45*pl)+')':CY+'0.25)';
    const aw=S*0.072, ah=S*0.012, ax1=x+W, ax0=ax1-aw, ay=footRule-S*0.030;
    xc.save(); xc.strokeStyle=col; xc.lineWidth=Math.max(1.5,S*0.0017); xc.lineJoin='miter';
    xc.beginPath(); xc.moveTo(ax0,ay); xc.lineTo(ax1,ay); xc.moveTo(ax1-ah,ay-ah); xc.lineTo(ax1,ay); xc.lineTo(ax1-ah,ay+ah); xc.stroke(); xc.restore(); } }

/* bokeh — dark, subtle, receding lip field behind the hero (its own #bg canvas, z1).
   Each cutout is feathered + blurred into a cache ONCE, so per-frame cost is just cheap drawImages. */
const BOKEH_ON=new Set([S.MEASURE,S.EXCHANGE,S.GRADING,S.STRESS,S.DISASSEMBLE,S.DELTA,S.IDEAL_ALONE,S.ASSEMBLE,S.ABSORB,S.ARCHIVE,S.ABSENCE]);
const BOKEH=Array.from({length:12},(_,i)=>({img:LIP_KEEP[i%LIP_KEEP.length], x:rnd(i*1.7+0.3), y:rnd(i*2.3+0.9), r:0.10+rnd(i*3.1)*0.09, ph:rnd(i*4.7)*6.28, sp:0.015+rnd(i*5.3)*0.02}));
const bokehCache=[]; let bokehI=0;
function buildBokehTile(idx){ const img=lipImgs[idx]; if(!img) return null; const S=256, c=document.createElement('canvas'); c.width=c.height=S; const g=c.getContext('2d');
  const a=img.naturalWidth/img.naturalHeight; let dw=S,dh=S/a; if(dh>S){dh=S;dw=S*a;}
  g.filter='blur(6px)'; g.drawImage(img,(S-dw)/2,(S-dh)/2,dw,dh); g.filter='none';
  g.globalCompositeOperation='destination-in'; const rg=g.createRadialGradient(S/2,S/2,S*0.10,S/2,S/2,S*0.5); rg.addColorStop(0,'#000'); rg.addColorStop(0.5,'#000'); rg.addColorStop(1,'rgba(0,0,0,0)'); g.fillStyle=rg; g.fillRect(0,0,S,S); return c; }
function drawBokeh(){ bgc.clearRect(0,0,sizePx,sizePx); bokehI=lerp(bokehI, BOKEH_ON.has(state)?1:0, 0.05); if(bokehI<0.02) return;
  const reduce=(window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches), t=reduce?0:T;
  for(const b of BOKEH){ if(bokehCache[b.img]===undefined) bokehCache[b.img]=buildBokehTile(b.img); const tile=bokehCache[b.img]; if(!tile) continue;
    const dx=Math.sin(t*b.sp+b.ph)*sizePx*0.018, dy=Math.cos(t*b.sp*0.8+b.ph)*sizePx*0.018, rad=b.r*sizePx;
    bgc.save(); bgc.globalAlpha=0.16*bokehI; bgc.drawImage(tile, (0.1+b.x*0.8)*sizePx+dx-rad, (0.12+b.y*0.76)*sizePx+dy-rad, rad*2, rad*2); bgc.restore(); }
  bgc.save(); bgc.globalCompositeOperation='multiply'; bgc.fillStyle='rgba(26,8,12,1)'; bgc.fillRect(0,0,sizePx,sizePx); bgc.restore(); }

const hud=document.getElementById('umhud');
function drawHud(){ if(!DEBUG){ hud.textContent=''; return; }
  hud.textContent='['+NAME[state]+' '+st.toFixed(1)+'s] cam:'+(camOK?'OK':'NO')+' faces:'+faceCount+' mesh:'+(faceEdges?faceEdges.length:0)+' cap:'+capAmt.toFixed(2)+' str:'+stretch.toFixed(2)+' chill:'+chill.toFixed(2)+' dev:'+devShown.toFixed(1)+' mean(n='+meanN+')'+(SWAP?(' swap:'+swapState+'('+swapMouths.length+')'):''); }

// debug/export: jump straight to any state by name and pin it (clean single-screen capture for verification + Figma export)
if(DEBUG){ window.__go=(name,k=0.5)=>{ const s=S[name]; if(s==null){ console.warn('no state',name); return; } report=null; window.__holdState=s; window.__holdK=k; enter(s); return NAME[s]; };
  const scr=new URLSearchParams(location.search).get('screen'); if(scr) requestAnimationFrame(()=>window.__go(scr));
}
requestAnimationFrame(frame);
</script>
